<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="netflix.png">
    <link rel="stylesheet" href="styles.css">
    <title>Netflix India - Watch TV Shows Online, Watch Movies Online</title>
</head>
<body>
    <div id="body-page">
        <div id="web-top">
            <div id="dark-effect">
                <div id="nav-bar">
                    <span><img src="netflix (1).png" alt=""></span>
                    <div>
                        <div id="lang" >
                            <img src="translate.png" alt="">
                            <select name="lan" id="lan">
                                <option value="en">English</option>
                                <option value="hi">हिन्दी</option>
                            </select>
                        </div>
                        <button id="sign-in">Sign In</button>
                    </div>
                </div>
                
                <div id="fr-web">
                    <div id="fr-txt">
                        <pre><h1>Unlimited movies,
TV shows and more</h1></pre>
                        <br>
                        <p>Starts at ₹149. Cancel at any time.</p>
                    </div>
                    <div id="begin">
                        <p>Ready to watch? Enter your email to create or restart your membership.</p>
                        <div id="email-get-started">
                            <div id="email-inp">
                                <input type="email" id="email" placeholder=" " required>
                                <label for="email">Email address</label>
                            </div>
                            <div id="get-started">
                                <p>Get Started</p> 
                                <img src="down-arrow.png" alt="">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="trending-section">
            <h2>Trending Now</h2>
            <div id="country-movies">
                <select name="country" id="country" class="select-mod">
                    <option value="in">India</option>
                    <option value="usa">USA</option>
                    <option value="uk">UK</option>
                </select>
                <select name="movies" id="movies" class="select-mod">
                    <option value="movies">Movies</option>
                    <option value="tv-shows">TV Shows</option>
                </select>
            </div>
            <div id="slider">
                
            </div>
        </div>
    </div>
</body>
</html>
